[workspace]
resolver = "2"
members = [
    "core",
    "libcore",
    "bot-sdk",
]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde-big-array = "0.5"
bincode = "1.3"
thiserror = "1"
anyhow = "1"
rand = "0.8"
zeroize = { version = "1", features = ["derive"] }
ed25519-dalek = "2"
x25519-dalek = { version = "2", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
hkdf = "0.12"
hmac = "0.12"
sha2 = "0.10"
argon2 = "0.5"
rusqlite = { version = "0.32", features = ["bundled-sqlcipher-vendored-openssl"] }
arti-client = { version = "0.23", features = ["tokio", "rustls", "onion-service-client", "onion-service-service"] }
tor-hsservice = "0.23"
tor-rtcompat = { version = "0.23", features = ["tokio"] }
tor-cell = "0.23"
futures = "0.3"
libc = "0.2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"