name: build

# Compile check for the i2p fork: builds the bundled go-i2p SAM router (pure Go)
# and the Rust workspace on GitHub-hosted runners. Full release artifacts
# (installers) are produced by release.yml on a tag. All builds are CI-only.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Bundled i2p router (github.com/go-i2p/go-sam-bridge embedded router + SAM).
  # Pure Go, CGO disabled -> trivially cross-compiles for every target.
  # ---------------------------------------------------------------------------
  router:
    name: i2p-router (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64,  out: gipny-i2p-router-linux-amd64 }
          - { goos: linux,   goarch: arm64,  out: gipny-i2p-router-linux-arm64 }
          - { goos: windows, goarch: amd64,  out: gipny-i2p-router-windows-amd64.exe }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum
      - name: build
        working-directory: i2p-router
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags "-s -w" -o "${{ matrix.out }}" .
          ls -la "${{ matrix.out }}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.out }}
          path: i2p-router/${{ matrix.out }}

  # ---------------------------------------------------------------------------
  # Rust workspace: libcore + relay + the Tauri app (compile check).
  # ---------------------------------------------------------------------------
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: system deps (Tauri / gstreamer)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libunwind-dev libsoup-3.0-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum
      - name: stage bundled router (tauri.conf resources glob needs it)
        run: |
          mkdir -p core/resources
          CGO_ENABLED=0 go build -C i2p-router -trimpath -ldflags "-s -w" \
            -o "$GITHUB_WORKSPACE/core/resources/gipny-i2p-router" .
      - name: build libcore + relay
        run: |
          cargo build --release -p gipny-libcore
          cargo build --release --manifest-path core/relay/Cargo.toml
      - name: build app (frontend + tauri)
        run: |
          cd ui && npm ci && npm run build && cd ..
          cargo build --release -p gipny

  # ---------------------------------------------------------------------------
  # Rust tests: vault lifecycle, first-run recovery, KDF timing report.
  # Timing lines ([timing] …) are lifted into the job summary so unlock speed
  # is visible on every build.
  # ---------------------------------------------------------------------------
  tests:
    name: rust tests (vault/kdf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run libcore tests
        run: cargo test --release -p gipny-libcore -- --nocapture 2>&1 | tee test-out.txt
      - name: timing summary
        if: always()
        run: |
          {
            echo '### Vault / KDF timings'
            echo '```'
            grep -a "\[timing\]" test-out.txt || echo 'no timing lines captured'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Frontend type-check (classic UI).
  # ---------------------------------------------------------------------------
  ui:
    name: ui typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci && npm run build

  # ---------------------------------------------------------------------------
  # Android integration: build installable debug APKs for arm64-v8a (real
  # devices) and x86_64 (emulator) and assert that the in-process go-i2p JNI
  # library is actually packaged for each ABI.
  # ---------------------------------------------------------------------------
  android:
    name: android APK
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v4
      - name: install NDK
        run: |
          sdkmanager --install "ndk;27.3.13750724"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> "$GITHUB_ENV"
          # openssl-src's Android build expects binutils-style `<triple>-ranlib`/
          # `<triple>-ar`; NDK r23+ ships only the llvm-* names. Shim them.
          tc="$ANDROID_SDK_ROOT/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin"
          for triple in aarch64-linux-android x86_64-linux-android; do
            ln -sf "$tc/llvm-ranlib" "$tc/$triple-ranlib"
            ln -sf "$tc/llvm-ar" "$tc/$triple-ar"
          done
          echo "$tc" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: install tauri-cli
        run: cargo install tauri-cli --version '^2' --locked
      - name: build frontend
        run: cd ui && npm ci && npm run build
      # tauri builds every requested target into the "universal" flavor output
      # (outputs/apk/universal/debug/app-universal-debug.apk), so a second
      # `--target` build overwrites the first APK. Build one ABI at a time,
      # verify + stash the APK, and wipe outputs/ before the next build.
      - name: build Android APK (aarch64)
        run: cd core && cargo tauri android build --debug --apk --target aarch64
      - name: verify + stash APK (aarch64)
        run: |
          apk="$(find core/gen/android/app/build/outputs -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          unzip -l "$apk" | grep -F 'lib/arm64-v8a/libgipnyi2p.so'
          mkdir -p dist/arm64
          find core/gen/android/app/build/outputs -type f -name '*.apk' -exec cp {} dist/arm64/ \;
          ls -la dist/arm64
          test -n "$(find dist/arm64 -type f -name '*.apk' -print -quit)"
          rm -rf core/gen/android/app/build/outputs
      - name: build Android APK (x86_64)
        run: cd core && cargo tauri android build --debug --apk --target x86_64
      - name: verify + stash APK (x86_64)
        run: |
          apk="$(find core/gen/android/app/build/outputs -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          unzip -l "$apk" | grep -F 'lib/x86_64/libgipnyi2p.so'
          mkdir -p dist/x86_64
          find core/gen/android/app/build/outputs -type f -name '*.apk' -exec cp {} dist/x86_64/ \;
          ls -la dist/x86_64
          test -n "$(find dist/x86_64 -type f -name '*.apk' -print -quit)"
      - uses: actions/upload-artifact@v7
        with:
          name: gipny-android-debug-apk
          path: dist/arm64/*.apk
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: gipny-android-debug-apk-x86_64
          path: dist/x86_64/*.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android emulator smoke: install the x86_64 debug APK on a cold emulator,
  # assert GipnyService + SAM bridge start, and report cold-start time and PSS.
  # continue-on-error: true so a flaky emulator never breaks the main build.
  # ---------------------------------------------------------------------------
  android-smoke:
    name: android emulator smoke
    needs: android
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v4
      - name: install emulator system image
        run: |
          sdkmanager --install "emulator" "system-images;android-33;google_apis;x86_64"
          echo "no" | avdmanager create avd \
            -n smoke \
            -k "system-images;android-33;google_apis;x86_64" \
            --force
      - uses: actions/download-artifact@v8
        with:
          name: gipny-android-debug-apk-x86_64
          path: apk-x86_64
      - name: emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          avd-name: smoke
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            APK=$(find apk-x86_64 -name '*.apk' | head -1)
            echo "Installing $APK"
            adb install "$APK"

            # Cold start: `am start -W` blocks until the activity is displayed
            # and reports TotalTime (ms from launch to first frame).
            START_OUTPUT=$(adb shell am start -W -n app.gipny.i2p/.MainActivity)
            echo "$START_OUTPUT"
            COLD_MS=$(echo "$START_OUTPUT" | grep TotalTime | awk '{print $2}')

            # Assert the process is alive.
            adb shell pidof app.gipny.i2p

            # GipnyService: wait up to 15 s for the foreground-service start log.
            # This is a hard assertion — if it times out, the step fails (the job
            # has continue-on-error: true, so it never blocks other jobs).
            timeout 15 adb logcat -s GipnyService | grep -m1 "GipnyService started"

            # SAM bridge: wait up to 90 s (router bootstrap can take ~60 s).
            # Best-effort only — mark non-fatal while the emulator path matures.
            timeout 90 adb logcat -s GipnyService | grep -m1 "SAM bridge ready" || true

            # Memory snapshot.
            MEMINFO=$(adb shell dumpsys meminfo app.gipny.i2p 2>/dev/null || echo "")
            PSS_KB=$(echo "$MEMINFO" | awk '/TOTAL PSS/ {print $NF}' | head -1)

            {
              echo "### Android Emulator Smoke (x86_64, API 33)"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Cold start (TotalTime) | ${COLD_MS:-n/a} ms |"
              echo "| Total PSS | ${PSS_KB:-n/a} kB |"
            } >> "$GITHUB_STEP_SUMMARY"
