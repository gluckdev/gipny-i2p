name: build

# Compile check for the i2p fork: builds the bundled go-i2p SAM router (pure Go)
# and the Rust workspace on GitHub-hosted runners. Full release artifacts
# (installers) are produced by release.yml on a tag. All builds are CI-only.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Bundled i2p router (github.com/go-i2p/go-sam-bridge embedded router + SAM).
  # Pure Go, CGO disabled -> trivially cross-compiles for every target.
  # ---------------------------------------------------------------------------
  router:
    name: i2p-router (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64,  out: gipny-i2p-router-linux-amd64 }
          - { goos: linux,   goarch: arm64,  out: gipny-i2p-router-linux-arm64 }
          - { goos: windows, goarch: amd64,  out: gipny-i2p-router-windows-amd64.exe }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum
      - name: build
        working-directory: i2p-router
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags "-s -w" -o "${{ matrix.out }}" .
          ls -la "${{ matrix.out }}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.out }}
          path: i2p-router/${{ matrix.out }}

  # ---------------------------------------------------------------------------
  # Rust workspace: libcore + relay + the Tauri app (compile check).
  # ---------------------------------------------------------------------------
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: system deps (Tauri / gstreamer)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libunwind-dev libsoup-3.0-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum
      - name: stage bundled router (tauri.conf resources glob needs it)
        run: |
          mkdir -p core/resources
          CGO_ENABLED=0 go build -C i2p-router -trimpath -ldflags "-s -w" \
            -o "$GITHUB_WORKSPACE/core/resources/gipny-i2p-router" .
      - name: build libcore + relay
        run: |
          cargo build --release -p gipny-libcore
          cargo build --release --manifest-path core/relay/Cargo.toml
      - name: build app (frontend + tauri)
        run: |
          cd ui && npm ci && npm run build && cd ..
          cargo build --release -p gipny

  # ---------------------------------------------------------------------------
  # Rust tests: vault lifecycle, first-run recovery, KDF timing report.
  # Timing lines ([timing] …) are lifted into the job summary so unlock speed
  # is visible on every build.
  # ---------------------------------------------------------------------------
  tests:
    name: rust tests (vault/kdf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run libcore tests
        run: cargo test --release -p gipny-libcore -- --nocapture 2>&1 | tee test-out.txt
      - name: timing summary
        if: always()
        run: |
          {
            echo '### Vault / KDF timings'
            echo '```'
            grep -a "\[timing\]" test-out.txt || echo 'no timing lines captured'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Frontend type-check (classic UI).
  # ---------------------------------------------------------------------------
  ui:
    name: ui typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci && npm run build

  # ---------------------------------------------------------------------------
  # Android integration: build an installable debug APK and assert that the
  # in-process go-i2p JNI library is actually packaged for arm64.
  # ---------------------------------------------------------------------------
  android:
    name: android APK
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v4
      - name: install NDK
        run: |
          sdkmanager --install "ndk;27.3.13750724"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> "$GITHUB_ENV"
          # openssl-src's Android build expects binutils-style `<triple>-ranlib`/
          # `<triple>-ar`; NDK r23+ ships only the llvm-* names. Shim them.
          tc="$ANDROID_SDK_ROOT/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin"
          for triple in aarch64-linux-android x86_64-linux-android; do
            ln -sf "$tc/llvm-ranlib" "$tc/$triple-ranlib"
            ln -sf "$tc/llvm-ar" "$tc/$triple-ar"
          done
          echo "$tc" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: install tauri-cli
        run: cargo install tauri-cli --version '^2' --locked
      - name: build frontend
        run: cd ui && npm ci && npm run build
      - name: build Android APK
        run: cd core && cargo tauri android build --debug --apk --target aarch64
      - name: verify embedded router
        run: |
          apk="$(find core/gen/android/app/build/outputs -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          unzip -l "$apk" | grep -F 'lib/arm64-v8a/libgipnyi2p.so'
      - uses: actions/upload-artifact@v7
        with:
          name: gipny-android-debug-apk
          path: core/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error
