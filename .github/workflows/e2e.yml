name: e2e

# End-to-end messaging test: relay + two headless bot clients, latency report.
#
# Ships as `continue-on-error: true` because real i2p tunnels in CI are
# inherently flaky (reseed, tunnel-build races, runner throttling).  It
# proves the full "boot → link → deliver → measure" path end to end.
#
# Pattern reused from relay-testnet.yml:
#   - SAM /dev/tcp probe loop
#   - dest.pub written by the relay before its SAM session opens
#   - GIPNY_RELAY_DATA for relay state directory
#   - GIPNY_I2P_BIN so both the relay and the harness find the router binary

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: e2e (relay + two bots)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      # ------------------------------------------------------------------
      # Checkout + toolchains
      # ------------------------------------------------------------------
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Cache the relay sub-workspace and the harness separately from the
          # main workspace so the large Tauri/gstreamer deps don't bloat this job.
          workspaces: |
            core/relay
            . -> target

      # ------------------------------------------------------------------
      # Build all three binaries
      # ------------------------------------------------------------------
      - name: build i2p router
        run: |
          CGO_ENABLED=0 go build -C i2p-router -trimpath -ldflags "-s -w" \
            -o "$GITHUB_WORKSPACE/gipny-i2p-router" .

      - name: build relay
        run: |
          cargo build --release --manifest-path core/relay/Cargo.toml

      - name: build e2e harness
        run: |
          cargo build --release -p e2e-harness

      # ------------------------------------------------------------------
      # Start the i2p router for the relay
      # ------------------------------------------------------------------
      - name: start router (relay)
        run: |
          mkdir -p e2e-state/relay-router e2e-state/relay e2e-state/bot-a e2e-state/bot-b e2e-logs
          nohup ./gipny-i2p-router \
            --sam-listen 127.0.0.1:7656 \
            --data e2e-state/relay-router \
            > e2e-logs/relay-router.log 2>&1 &
          echo $! > relay-router.pid
          echo "[e2e-setup] relay router pid=$(cat relay-router.pid)"

          # Wait for SAM to be ready (bash /dev/tcp probe — nc not guaranteed)
          echo "[e2e-setup] waiting for SAM on 127.0.0.1:7656..."
          for i in $(seq 1 180); do
            if timeout 2 bash -c 'exec 3<>/dev/tcp/127.0.0.1/7656' 2>/dev/null; then
              echo "[e2e-setup] SAM ready after ${i}×2 s"
              break
            fi
            if ! kill -0 "$(cat relay-router.pid)" 2>/dev/null; then
              echo "relay router died during startup"
              tail -50 e2e-logs/relay-router.log
              exit 1
            fi
            sleep 2
          done

      # ------------------------------------------------------------------
      # Start the relay; wait for dest.pub
      # ------------------------------------------------------------------
      - name: start relay, capture destination
        run: |
          GIPNY_RELAY_DATA=e2e-state/relay \
          nohup ./core/relay/target/release/gipny-relay \
            > e2e-logs/relay.log 2>&1 &
          echo $! > relay.pid
          echo "[e2e-setup] relay pid=$(cat relay.pid)"

          # dest.pub is written by the relay before its SAM session opens.
          echo "[e2e-setup] waiting for dest.pub..."
          for i in $(seq 1 120); do
            [ -s e2e-state/relay/dest.pub ] && break
            if ! kill -0 "$(cat relay.pid)" 2>/dev/null; then
              echo "relay died during startup"
              tail -50 e2e-logs/relay.log
              exit 1
            fi
            sleep 2
          done
          if [ ! -s e2e-state/relay/dest.pub ]; then
            echo "dest.pub never appeared"; tail -50 e2e-logs/relay.log; exit 1
          fi

          RELAY_DEST="$(cat e2e-state/relay/dest.pub)"
          echo "RELAY_DEST=$RELAY_DEST" >> "$GITHUB_ENV"
          echo "[e2e-setup] relay destination: ${RELAY_DEST:0:20}..."

      # ------------------------------------------------------------------
      # Run the end-to-end harness
      # ------------------------------------------------------------------
      - name: run e2e harness
        env:
          E2E_RELAY_DEST: ${{ env.RELAY_DEST }}
          E2E_N_MESSAGES: '5'
          E2E_TIMEOUT_SECS: '600'
          E2E_WORK_DIR: e2e-state
          # Let libcore find the router binary for the two bot instances.
          GIPNY_I2P_BIN: ${{ github.workspace }}/gipny-i2p-router
        run: |
          # /usr/bin/time -v for peak RSS; fall back gracefully if unavailable.
          if command -v /usr/bin/time >/dev/null 2>&1; then
            /usr/bin/time -v ./target/release/e2e-harness \
              > e2e-logs/harness.log 2>&1
            TIME_RC=$?
          else
            ./target/release/e2e-harness > e2e-logs/harness.log 2>&1
            TIME_RC=$?
          fi
          cat e2e-logs/harness.log
          exit $TIME_RC

      # ------------------------------------------------------------------
      # Publish timing report to the job summary
      # ------------------------------------------------------------------
      - name: timing summary
        if: always()
        run: |
          {
            echo '### e2e messaging test'
            echo ''
            # Extract the timing table printed by the harness
            if grep -q '\[e2e-timing\]' e2e-logs/harness.log 2>/dev/null; then
              grep -A 20 '\[e2e-timing\]' e2e-logs/harness.log | tail -20
            else
              echo '_harness log not available or timing block missing_'
            fi
            echo ''
            # Peak RSS from /usr/bin/time -v output (if available)
            if grep -q 'Maximum resident' e2e-logs/harness.log 2>/dev/null; then
              echo '**Peak RSS (harness process):**'
              echo '```'
              grep 'Maximum resident' e2e-logs/harness.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ------------------------------------------------------------------
      # Stop relay + router
      # ------------------------------------------------------------------
      - name: stop relay and router
        if: always()
        run: |
          kill "$(cat relay.pid)" 2>/dev/null || true
          sleep 2
          kill "$(cat relay-router.pid)" 2>/dev/null || true
          echo '--- relay log (last 30 lines) ---'
          tail -30 e2e-logs/relay.log || true

      # ------------------------------------------------------------------
      # Upload logs as artifact on failure for post-mortem
      # ------------------------------------------------------------------
      - name: upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: e2e-logs/
          retention-days: 7
