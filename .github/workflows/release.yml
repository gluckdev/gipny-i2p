name: release

# Full release pipeline on GitHub Actions — no local docker/build.sh needed.
# Builds the bundled pure-Go i2p router and every desktop artifact (Linux
# AppImage/deb + Windows NSIS/zip), plus Android (i2p router embedded
# in-process via JNI; see i2p-router/android_export.go).
#
# Trigger: push a tag `v*` (e.g. v0.3.0) or run manually.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

# Least privilege by default; only the publish job elevates to write.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Bundled i2p router (pure Go, CGO off -> cross-compiles anywhere).
  # ---------------------------------------------------------------------------
  router:
    name: router (i2pd, ${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux is built against musl and fully static, so one file runs on
          # every distribution — Arch, Void, CentOS, Deepin — instead of
          # carrying a glibc floor from whatever image built it.
          - { label: linux/amd64, runs-on: ubuntu-latest, out: i2pd, artifact: router-linux-amd64 }
          - { label: windows/amd64, runs-on: windows-latest, out: i2pd.exe, artifact: router-windows-amd64 }
    steps:
      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib

      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # Built from third_party/i2pd, not downloaded: a release must be
      # reproducible from this repository, and an upstream binary would also be
      # a binary nobody here reviewed. See docs/i2p-transport-evaluation.md for
      # why the router changed at all — go-i2p never delivered a message.
      - name: build (linux, static musl)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            apk add --no-cache build-base git make g++ \
              boost-dev boost-static openssl-dev openssl-libs-static zlib-dev zlib-static
            git config --global --add safe.directory "*"
            cd third_party/i2pd
            make USE_UPNP=no LDFLAGS=-static -j"$(nproc)"
            strip --strip-unneeded i2pd
          '
          ldd third_party/i2pd/i2pd 2>&1 | grep -qiE 'not a (valid )?dynamic|statically linked' \
            || { echo "router is not static — it would not run on other distros"; exit 1; }
          ls -lh third_party/i2pd/i2pd

      - name: build (windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd third_party/i2pd
          make USE_UPNP=no -j"$(nproc)"
          strip --strip-unneeded i2pd.exe
          ls -lh i2pd.exe

      # Shrink the bundled router. Linux only: UPX-packed Windows executables
      # routinely trip antivirus false positives.
      - name: compress router (UPX)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma "third_party/i2pd/${{ matrix.out }}"
          ls -lh "third_party/i2pd/${{ matrix.out }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: third_party/i2pd/${{ matrix.out }}

  # ---------------------------------------------------------------------------
  # 2. Desktop: Linux (AppImage + deb) and Windows (NSIS). Stages the matching
  #    router binary into core/resources so Tauri bundles it (see tauri.conf).
  # ---------------------------------------------------------------------------
  desktop:
    name: desktop (${{ matrix.os }})
    needs: router
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, router: router-linux-amd64,   rbin: i2pd,                 bundles: 'appimage,deb' }
          - { os: windows-latest, router: router-windows-amd64, rbin: i2pd.exe,             bundles: 'nsis' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # ubuntu-22.04 image: preinstalled libunwind-14-dev conflicts with
          # libunwind-dev required by libgstreamer1.0-dev (runner-images#6399).
          sudo apt-get remove -y libunwind-14-dev || true
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libunwind-dev libsoup-3.0-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v7
        with: { node-version: '20', cache: npm, cache-dependency-path: ui/package-lock.json }
      - name: stage bundled router
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.router }}
          path: core/resources
      - name: mark router executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x core/resources/${{ matrix.rbin }}
      - name: build frontend
        run: cd ui && npm ci && npm run build
      - name: tauri build
        uses: tauri-apps/tauri-action@v1
        with:
          projectPath: core
          args: --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v7
        with:
          name: gipny-${{ runner.os }}
          # The app crate is a workspace member — cargo's target dir is at the
          # repo root, not under core/.
          if-no-files-found: error
          path: |
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*-setup.exe
            target/release/bundle/**/*.msi

  # ---------------------------------------------------------------------------
  # 2b. Xbox appearance variant (separate app id/name). Same backend, only a
  #     build-time theme (VITE_THEME=xbox) + a merged Tauri config. Linux AppImage.
  # ---------------------------------------------------------------------------
  desktop-xbox:
    name: desktop xbox (linux)
    # Parked per product decision (2026-07-18): the Xbox appearance variant is
    # postponed. Flip back to `needs: router` alone to re-enable.
    if: ${{ false }}
    needs: router
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: system deps
        run: |
          sudo apt-get update
          sudo apt-get remove -y libunwind-14-dev || true
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libunwind-dev libsoup-3.0-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v7
        with: { node-version: '20', cache: npm, cache-dependency-path: ui/package-lock.json }
      - uses: actions/download-artifact@v8
        with: { name: router-linux-amd64, path: core/resources }
      - run: chmod +x core/resources/i2pd
      - name: build frontend (xbox theme)
        env: { VITE_THEME: xbox }
        run: cd ui && npm ci && npm run build
      - name: tauri build (xbox config)
        uses: tauri-apps/tauri-action@v1
        with:
          projectPath: core
          args: --config tauri.xbox.conf.json --bundles appimage
      - uses: actions/upload-artifact@v7
        with:
          name: gipny-xbox-Linux
          if-no-files-found: error
          path: target/release/bundle/**/*.AppImage

  # ---------------------------------------------------------------------------
  # 3. Android. Builds the APK with the go-i2p router embedded in-process via
  #    JNI: i2p-router/android_export.go + jni_shim_android.c are cross-compiled
  #    (cgo, buildmode=c-shared) into a per-ABI libgipnyi2p.so by the
  #    `buildGoRouterJniLibs` Gradle task (core/gen/android/app/build.gradle.kts),
  #    loaded and started by GipnyService.kt on service start.
  # ---------------------------------------------------------------------------
  android:
    name: android
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache-dependency-path: i2p-router/go.sum
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v4
      - name: install NDK
        run: |
          sdkmanager --install "ndk;27.3.13750724"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> "$GITHUB_ENV"
          # openssl-src's Android build expects binutils-style `<triple>-ranlib`/
          # `<triple>-ar`; NDK r23+ ships only the llvm-* names. Shim them.
          tc="$ANDROID_SDK_ROOT/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin"
          for triple in aarch64-linux-android x86_64-linux-android; do
            ln -sf "$tc/llvm-ranlib" "$tc/$triple-ranlib"
            ln -sf "$tc/llvm-ar" "$tc/$triple-ar"
          done
          echo "$tc" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v7
        with: { node-version: '20', cache: npm, cache-dependency-path: ui/package-lock.json }
      - name: install tauri-cli
        run: cargo install tauri-cli --version '^2' --locked
      - name: build frontend
        run: cd ui && npm ci && npm run build
      - name: configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/gipny-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/gipny-release.jks" >> "$GITHUB_ENV"
      - name: tauri android build
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cd core && cargo tauri android build --apk --target aarch64
      - name: verify signed APK
        run: |
          # apksigner is not on PATH — pick the newest build-tools copy.
          APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner -type f | sort -V | tail -1)"
          test -n "$APKSIGNER"
          mapfile -d '' apks < <(find core/gen/android/app/build/outputs -type f -name '*.apk' -print0)
          test "${#apks[@]}" -gt 0
          for apk in "${apks[@]}"; do
            "$APKSIGNER" verify --verbose "$apk"
          done
      - uses: actions/upload-artifact@v7
        with:
          name: gipny-android
          path: core/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. Collect desktop artifacts into a GitHub Release (on tags).
  # ---------------------------------------------------------------------------
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release + upload assets
    steps:
      - uses: actions/download-artifact@v8
        with: { pattern: gipny-*, path: dist, merge-multiple: true }
      - name: release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          generate_release_notes: true
