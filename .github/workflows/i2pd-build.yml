name: i2pd-build

# Builds the i2pd router ourselves, for the platforms gipny ships on, so we can
# bundle it the way we bundle gipny-i2p-router today.
#
# Why: go-i2p never finishes building client tunnels, so it delivers nothing
# (#46, go-i2p#55). With i2pd underneath, the same relay, bots and harness
# deliver 5/5 messages over live i2p — see docs/i2p-transport-evaluation.md.
# Nothing in the Rust code changes: it speaks plain SAMv3 to whatever answers
# on 127.0.0.1:7656.
#
# This is a spike. It answers "can we produce these binaries in CI at all",
# not "are they ready to ship". Nothing here is wired into the app yet.
#
# Desktop comes from the i2pd repo directly (static link, so the bundle has no
# runtime dependencies). Android comes from i2pd-android's binary/ build, which
# produces a standalone i2pd executable rather than their app.

on:
  workflow_dispatch:
  # TEMPORARY, remove before merging: workflow_dispatch only resolves for
  # workflows already on the default branch.
  push:
    branches:
      - ci/i2pd-router-build

permissions:
  contents: read

env:
  # The i2pd revision itself comes from the third_party/i2pd submodule pin; this
  # only tells the Android build which i2pd tag to align its own nested copy to.
  I2PD_VERSION: '2.60.0'
  # moritz-wundke/Boost-for-Android master as of 2026-07-05. See the Android
  # job for why this is overridden and why it is a commit rather than a branch.
  BOOST_FOR_ANDROID_REV: '7943955c4d11a5bd61381a8b200c28619323eb0f'

jobs:
  # --------------------------------------------------------------------------
  # Desktop: linux x86_64, statically linked against boost/openssl/zlib.
  # --------------------------------------------------------------------------
  linux:
    name: linux x86_64 (static)
    # Same image the release job builds the desktop bundles on. boost, openssl
    # and zlib are linked statically, but glibc cannot be — so the binary still
    # carries a minimum glibc, and building on a newer image than the release
    # uses would produce a router the app itself cannot run on older distros.
    # This is a real regression against today's Go router, which is built with
    # CGO_ENABLED=0 and depends on nothing at all. If it bites, the answer is a
    # musl build, not a newer runner.
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: install build dependencies
        run: |
          sudo apt-get update
          # The -dev packages carry the .a archives USE_STATIC=yes links against.
          sudo apt-get install -y --no-install-recommends \
            build-essential libboost-program-options-dev libssl-dev zlib1g-dev

      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: build
        working-directory: third_party/i2pd
        run: |
          # USE_UPNP is off: gipny only ever talks to a loopback SAM port, and
          # leaving UPnP out drops a dependency and a hole-punching side effect
          # nobody asked for.
          make USE_STATIC=yes USE_UPNP=no -j"$(nproc)"

      - name: verify
        working-directory: third_party/i2pd
        run: |
          ./i2pd --version
          echo "--- size ---"
          ls -lh i2pd
          echo "--- dynamic dependencies (want: libc/libm/libstdc++ only) ---"
          ldd ./i2pd || echo "(not a dynamic executable)"

      - uses: actions/upload-artifact@v4
        with:
          name: i2pd-linux-x86_64
          path: third_party/i2pd/i2pd
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Windows: the release job ships an NSIS installer, so the router has to
  # exist for it too. msys2's mingw packages supply boost and openssl, which is
  # how upstream builds their own Windows releases.
  # --------------------------------------------------------------------------
  windows:
    name: windows x86_64
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib

      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: build
        working-directory: third_party/i2pd
        run: make USE_UPNP=no -j"$(nproc)"

      - name: verify
        working-directory: third_party/i2pd
        run: |
          ./i2pd.exe --version
          ls -lh i2pd.exe
          # Which mingw DLLs travel with it decides what the installer bundles.
          ldd ./i2pd.exe | grep -iv '/c/windows' || true

      - uses: actions/upload-artifact@v4
        with:
          name: i2pd-windows-x86_64
          path: third_party/i2pd/i2pd.exe
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Android: standalone executable per ABI, matching the ABIs the APK ships.
  #
  # i2pd itself carries no Android build; it lives in i2pd-android, whose
  # binary/jni builds boost, openssl and miniupnpc from source per ABI and then
  # runs ndk-build. That is slow (tens of minutes) but it is the upstream path,
  # not a homemade one.
  # --------------------------------------------------------------------------
  android:
    name: android ${{ matrix.abi }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Same two the APK ships today: arm64-v8a for devices, x86_64 for the
        # emulator. `arch` is what the dependency scripts call it — they accept
        # arm64/x86_64/arm/x86 and silently ignore anything else (an unknown
        # argument falls through their `*)` case and builds nothing), while
        # ndk-build wants the ABI name.
        include:
          - abi: arm64-v8a
            arch: arm64
          - abi: x86_64
            arch: x86_64
          # 32-bit ARM is a measurement, not a commitment: the APK ships no
          # 32-bit ABI today (no armv7 Rust target, no 32-bit go-i2p .so), so
          # this leg only answers whether it builds and what it costs, for when
          # 32-bit device support is decided on its own merits.
          - abi: armeabi-v7a
            arch: arm
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: align the vendored sources
        working-directory: third_party/i2pd-android/binary/jni
        run: |
          # Build the i2pd revision this repo pins, not the one i2pd-android
          # happens to point at.
          git -C i2pd fetch --tags --depth 1 origin "$I2PD_VERSION"
          git -C i2pd checkout "$I2PD_VERSION"
          echo "[i2pd] i2pd at $(git -C i2pd describe --tags)"

          # i2pd-android pins Boost-for-Android to a commit whose NDK whitelist
          # predates every NDK the runners ship — run 29695096389 was rejected
          # with "Undefined or not supported Android NDK version: 27.3". A later
          # revision accepts up to 28.2. Overriding it in our own build is
          # exactly why these are submodules of this repo.
          #
          # Pinned to a commit, not to master: this is the one dependency we
          # move ourselves, and tracking a branch would let the Android router
          # change underneath us between two builds of the same tag.
          git -C boost fetch --depth 1 origin "$BOOST_FOR_ANDROID_REV"
          git -C boost checkout "$BOOST_FOR_ANDROID_REV"
          echo "[i2pd] Boost-for-Android at $(git -C boost log --oneline -1)"

      - name: resolve NDK
        env:
          # Pinned, not "whatever is newest". Boost-for-Android matches the NDK
          # version against a fixed list and refuses anything outside it: run
          # 29694856790 died on "Undefined or not supported Android NDK version:
          # 29.0", which is what the runners now ship by default. Its list ends
          # at 28.2, and 27.3 is also exactly the NDK build.yml uses for the APK,
          # so the router and the app are built with the same toolchain.
          NDK_VERSION: 27.3.13750724
        run: |
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [ ! -d "$NDK_DIR" ]; then
            echo "[i2pd] NDK $NDK_VERSION not present, installing"
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;$NDK_VERSION" >/dev/null
          fi
          test -d "$NDK_DIR"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "[i2pd] using NDK $NDK_DIR"
          cat "$NDK_DIR/source.properties" || true

      - name: build dependencies (boost, openssl, miniupnpc)
        working-directory: third_party/i2pd-android/binary/jni
        run: |
          ./build_boost.sh ${{ matrix.arch }}
          ./build_openssl.sh ${{ matrix.arch }}
          ./build_miniupnpc.sh ${{ matrix.arch }}

          # The scripts exit 0 whether or not they built anything, so check the
          # outputs exist before spending half an hour on ndk-build.
          for lib in boost openssl miniupnp; do
            if ! find "$lib" -name '*.a' | grep -q .; then
              echo "$lib produced no static libraries for ${{ matrix.arch }}"
              exit 1
            fi
          done

      - name: build i2pd
        working-directory: third_party/i2pd-android/binary/jni
        run: |
          # APP_ABI in Application.mk is "all"; narrow it to the one ABI this
          # matrix leg is for. APP_PLATFORM there is android-16, which modern
          # NDKs no longer support — 24 matches what the app targets.
          "$ANDROID_NDK_HOME/ndk-build" \
            -j"$(nproc)" \
            NDK_MODULE_PATH="$PWD" \
            APP_ABI=${{ matrix.abi }} \
            APP_PLATFORM=android-24

      - name: verify and stage
        working-directory: third_party/i2pd-android/binary
        run: |
          BIN="libs/${{ matrix.abi }}/i2pd"
          test -f "$BIN"
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" -s "$BIN"
          file "$BIN"
          ls -lh "$BIN"

          # Android refuses to execute binaries from the app's data directory,
          # so an executable has to travel inside the APK as a lib*.so in
          # jniLibs to land in nativeLibraryDir, which is executable.
          mkdir -p staged
          cp "$BIN" "staged/libi2pd.so"

      - uses: actions/upload-artifact@v4
        with:
          name: i2pd-android-${{ matrix.abi }}
          path: third_party/i2pd-android/binary/staged/libi2pd.so
          if-no-files-found: error
