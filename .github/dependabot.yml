# Dependabot — flags outdated dependencies across every ecosystem in the repo.
version: 2
updates:
  # Rust: main workspace (client, libcore, bot-sdk).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      rust-deps:
        patterns: ["*"]
    # Breaking bumps of the crypto/serde/storage stack — libcore's X3DH/ratchet
    # and vault code is written against these APIs; migrate deliberately (see
    # the crypto-stack migration issue), patch updates still flow.
    # bincode >=2 is a different API and 3.0.0 is a compile_error!() stub.
    ignore:
      - dependency-name: bincode
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: rand
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: sha2
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: hkdf
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: hmac
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: chacha20poly1305
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: argon2
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: ed25519-dalek
        update-types: ["version-update:semver-major"]
      - dependency-name: x25519-dalek
        update-types: ["version-update:semver-major"]
      - dependency-name: thiserror
        update-types: ["version-update:semver-major"]
      - dependency-name: rusqlite
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Rust: the relay server (separate workspace).
  - package-ecosystem: cargo
    directory: "/core/relay"
    schedule:
      interval: weekly
    groups:
      relay-deps:
        patterns: ["*"]

  # Go: the bundled i2p router wrapper.
  - package-ecosystem: gomod
    directory: "/i2p-router"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  # Frontend.
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    groups:
      ui-deps:
        patterns: ["*"]

  # GitHub Actions used in the CI/release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Vendored router sources (third_party/i2pd, third_party/i2pd-android).
  #
  # These track upstream branches and are bumped automatically by e2e-i2pd.yml
  # when a revision proves it delivers messages. Dependabot is the safety net
  # for the case where that job has not run or has been failing: it raises the
  # bump as a PR instead, and the same e2e runs on that PR (see the workflow's
  # pull_request trigger), so nothing reaches the pin without having delivered.
  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: weekly
    groups:
      router-sources:
        patterns: ["*"]
