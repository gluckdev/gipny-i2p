# Dependabot — flags outdated dependencies across every ecosystem in the repo.
version: 2
updates:
  # Rust: main workspace (client, libcore, bot-sdk).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      rust-deps:
        patterns: ["*"]

  # Rust: the relay server (separate workspace).
  - package-ecosystem: cargo
    directory: "/core/relay"
    schedule:
      interval: weekly
    groups:
      relay-deps:
        patterns: ["*"]
    # Breaking bumps for relay's current APIs; patch updates still flow.
    # bincode 3.0.0 on crates.io is a compile_error!() stub — never take it.
    # Drop this block once the relay migration issue lands.
    ignore:
      - dependency-name: bincode
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: rand
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: ed25519-dalek
        update-types: ["version-update:semver-major"]
      - dependency-name: thiserror
        update-types: ["version-update:semver-major"]
      - dependency-name: rusqlite
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Go: the bundled i2p router wrapper.
  - package-ecosystem: gomod
    directory: "/i2p-router"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  # Frontend.
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    groups:
      ui-deps:
        patterns: ["*"]

  # GitHub Actions used in the CI/release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
